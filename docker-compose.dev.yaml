version: "3.8"

services:
  template-db:
    image: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
    ports:
      - "${DB_EXPORT_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend

  template-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: [ "gunicorn", "main:app", "-k", "uvicorn.workers.UvicornWorker", "-w", "2", "-b", "0.0.0.0:8080", "--timeout", "120" ]
    env_file:
      - .env
    ports:
      - "${API_PORT:-8080}:8080"
    networks:
      - backend
    depends_on:
      - template-db

volumes:
  pg_data:

networks:
  backend: